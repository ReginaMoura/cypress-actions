name: Cypress Cloud

on:
  workflow_dispatch: 
    inputs:
      spec:
        description: Run by cypress comand line
        default: cypress/e2e/*
jobs:
  cypress-e2e-electron:
   runs-on: ubuntu-latest
   steps:
     - name: Get code
       uses: actions/checkout@v6.0.2

     - name: Cypress run
       uses: cypress-io/github-action@v6.5.0
       with:
         install-comand: yarn install
         browser: electron
         record: true
         group: UI Electron
         spec: ${{ github.event.inputs.spec }}
       env:
         CYPRESS_RECORD_KEY: fe93b225-68d7-48bd-ac0b-93b0174527dc
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN}}
      
        
         
  
        
